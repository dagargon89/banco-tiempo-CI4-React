name: API CI

on:
  push:
    paths: ['apps/api/**']
  pull_request:
    paths: ['apps/api/**']

defaults:
  run:
    working-directory: apps/api

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: banco_de_tiempo
          MYSQL_USER: bt_app
          MYSQL_PASSWORD: bt_app_ci
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, mysqli, redis, intl
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHPStan
        run: vendor/bin/phpstan analyse

      - name: PHPUnit
        env:
          CI_ENVIRONMENT: testing
          database.tests.hostname: 127.0.0.1
          database.tests.database: banco_de_tiempo
          database.tests.username: bt_app
          database.tests.password: bt_app_ci
          database.tests.DBDriver: MySQLi
          database.tests.port: 3306
        run: vendor/bin/phpunit

      - name: Composer audit
        run: composer audit --no-dev
